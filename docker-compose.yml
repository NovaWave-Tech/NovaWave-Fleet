# NovaWave Business ERP — ambiente de desenvolvimento
# Subir tudo:   docker compose up --build
# Derrubar:     docker compose down
services:
  db:
    image: postgres:16-alpine
    container_name: novawave-db
    environment:
      POSTGRES_DB: novawave
      POSTGRES_USER: novawave
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novawave -d novawave"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: novawave-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: novawave
      DB_USERNAME: novawave
      DB_PASSWORD: secret
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor

  frontend:
    build: ./frontend
    container_name: novawave-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  dbdata:
  backend_vendor:
  frontend_node_modules:
